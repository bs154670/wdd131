<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link rel="stylesheet" href="card.css" />
    <script src="card.js" defer></script>
</head>
<body>
    <div class="card">
    <img class="image" src="snortleblat.webp" alt="Snortleblat">
    <div class="name">Snortleblat</div>
    <div class="stats">
        <p>Class: Swamp Beast Diplomat</p>
        <p>Level: 5</p>
        <p>Health: 100</p>
    </div>
    <div class="buttons">
        <button>Attacked</button>
        <button>Level Up</button>
    </div>
</div>
</body>
</html>
