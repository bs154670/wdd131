<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Event Ticket</title>
        <link rel="icon" href="favicon.ico">
        <link rel="stylesheet" href="form2.css" />
        <script src="form2.js" defer></script>
    </head>
    <body>
        <main class="wrapper">
            <h1>Event Ticket</h1>
            <form id="fsyForm">
                <div class="field">
                    <label for="firstName">First Name</label>
                    <input id="firstName" name="firstName" type="text" required />
                </div>
                <div class="field">
                    <label for="lastName">Last Name</label>
                    <input id="lastName" name="lastName" type="text" required />
                </div>
                <div class="field full">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required />
                </div>
                <div class="field">
                    <label for="travelRange">Type</label>
                    <select
                        id="travelRange"
                        name="travelRange"
                        aria-controls="notesContainer"
                        required
                        >
                        <option value="">Choose one</option>
                        <option value="one">Guest</option>
                        <option value="many">Student</option>
                    </select>
                </div>
                <div class="field">
                    <label for="availableDate">Event Date</label>
                    <input id="availableDate" name="availableDate" type="date" required />
                </div>
                <div id="hiddenDiv" style="display: none;">
                    🎉 You selected Yes! This content is now visible.
                </div>
                <div id="notesContainer" class="field full" hidden>
                    <label for="notes">Student!#</label>
                    <input id="notes" name="notes" type="text" minlength="9" maxlength="9" placeholder="Enter 9 characters" required />
                    <small>Must be exactly 9 characters</small>
                </div>
                <div id="accessCodeContainer" class="field full" hidden>
                    <label for="accessCode">Access Code</label>
                    <input id="accessCode" name="accessCode" type="text" />
                </div>
                <button class="full" type="submit">Create Ticket</button>
            </form>
            <section id="output" aria-live="polite"></section>
        </main>
    </body>
</html>
